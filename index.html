<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Chargemet...</title>

<style>
body{
margin:0;
padding:0;
}

/* écran de chargement */
#loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
background:white;
display:flex;
justify-content:center;
align-items:center;
}

/* image du loader */
#loading img{
width:150px;
}

</style>
</head>

<body>

<div id="loading">
<img src="images/loading.png" alt="loading">
</div>

<script>

setTimeout(function(){
document.getElementById("loading").style.display="none";
},3000);

</script>

</body>
</html>
